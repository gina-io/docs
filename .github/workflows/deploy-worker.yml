name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'infra/cloudflare/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/cloudflare
          # Pin the CLI to v3 (wrangler-action@v3's former default) — the @v4 bump is only
          # for the node24 runtime; dropping this pin opts into the breaking Wrangler v4 CLI.
          wranglerVersion: "3.90.0"
