name: Token expiry reminder

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check token expiry
        run: |
          EXPIRY="2026-06-02"
          TODAY=$(date +%Y-%m-%d)
          DAYS=$(( ($(date -d "$EXPIRY" +%s) - $(date -d "$TODAY" +%s)) / 86400 ))
          if [ "$DAYS" -le 14 ]; then
            echo "TOKEN_EXPIRING=true" >> $GITHUB_ENV
            echo "DAYS_LEFT=$DAYS" >> $GITHUB_ENV
          fi

      - name: Open reminder issue
        if: env.TOKEN_EXPIRING == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Action required: tokens expire in ${process.env.DAYS_LEFT} days`,
              body: [
                `The following secrets expire on **2026-06-02** (90-day tokens created 2026-03-02):`,
                ``,
                `| Secret | Where to rotate |`,
                `|---|---|`,
                `| \`VERCEL_TOKEN\` | https://vercel.com/account/settings/tokens |`,
                `| \`CLOUDFLARE_API_TOKEN\` | https://dash.cloudflare.com/profile/api-tokens |`,
                ``,
                `After rotating both tokens:`,
                `1. Update the secrets at https://github.com/gina-io/docs/settings/secrets/actions`,
                `2. Update the \`EXPIRY\` date in \`.github/workflows/token-expiry-reminder.yml\``,
              ].join('\n'),
              labels: ['maintenance']
            })
